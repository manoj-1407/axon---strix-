  intl: ^0.19.0
  flutter_animate: ^4.5.0
  speech_to_text: ^6.6.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  google_fonts: ^6.2.1
  path_provider: ^2.1.4
  crypto: ^3.0.5
  image_picker: ^1.1.2
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
