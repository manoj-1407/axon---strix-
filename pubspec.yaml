name: axon
description: AXON — A precision AI interface.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.1
  dio: ^5.4.3+1
  get_it: ^7.7.0
  injectable: ^2.4.2
  flutter_markdown: ^0.7.3
  markdown: ^7.2.2
  shared_preferences: ^2.2.3
